services:
  # ========== 基础设施 ==========
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qingyun-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-qingyun}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qingyun-net

  redis:
    image: redis:7-alpine
    container_name: qingyun-redis
    # 通过 entrypoint 脚本从 secrets 文件读取密码并启动 Redis
    entrypoint: |
      /bin/sh -c '
        REDIS_PASS=$$(cat /run/secrets/redis_password 2>/dev/null || echo "")
        if [ -n "$$REDIS_PASS" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASS"
        else
          exec redis-server --appendonly yes
        fi
      '
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --raw incr ping 2>/dev/null || redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qingyun-net

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: qingyun-meilisearch
    # 通过 entrypoint 从 secrets 文件读取 master key 并设置环境变量，
    # 避免 MEILI_MASTER_KEY_FILE 在某些情况下读取失败导致容器反复崩溃
    entrypoint: |
      /bin/sh -c '
        export MEILI_MASTER_KEY=$$(cat /run/secrets/meilisearch_master_key 2>/dev/null | tr -d "\n")
        if [ -z "$$MEILI_MASTER_KEY" ]; then
          echo "ERROR: meilisearch_master_key secret is empty or missing" >&2
          exit 1
        fi
        exec /bin/sh -c "/usr/local/bin/entrypoint.sh --http-addr 0.0.0.0:7700"
      '
    environment:
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    volumes:
      - meilidata:/meili_data
    secrets:
      - meilisearch_master_key
    restart: unless-stopped
    networks:
      - qingyun-net

  # ========== 应用服务 ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: qingyun-app
    env_file:
      - .env
    environment:
      # 服务发现地址（密码通过 /run/secrets/ 注入，config.py 动态拼接 URL）
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - SECRETS_DIR=/run/secrets
      # CORS 允许的来源（逗号分隔，前端 EXE 使用 app:// 或 https:// 协议）
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    expose:
      - "8000"
    # 调试时可取消注释下面行，绕过 Nginx 直接访问
    # ports:
    #   - "${APP_PORT:-8000}:8000"
    secrets:
      - postgres_password
      - redis_password
      - meilisearch_master_key
      - secret_key
      - jwt_secret_key
      - deepseek_api_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - qingyun-net

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: qingyun-celery-worker
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - SECRETS_DIR=/run/secrets
    secrets:
      - postgres_password
      - redis_password
      - meilisearch_master_key
      - secret_key
      - jwt_secret_key
      - deepseek_api_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qingyun-net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: qingyun-celery-beat
    command: celery -A app.tasks.celery_app beat -l info
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SECRETS_DIR=/run/secrets
    secrets:
      - postgres_password
      - redis_password
      - secret_key
      - jwt_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qingyun-net

  # ========== 反向代理 ==========
  nginx:
    image: nginx:1.27-alpine
    container_name: qingyun-nginx
    volumes:
      # 配置模板 + 启动脚本
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ./nginx/entrypoint.sh:/docker-entrypoint.sh:ro
      # SSL 证书（自签名，USE_HTTPS=true 时自动生成）
      - nginx_ssl:/etc/nginx/ssl
      # Nginx 日志持久化
      - nginx_logs:/var/log/nginx
    environment:
      - SERVER_IP=${SERVER_IP:-}
      - USE_HTTPS=${USE_HTTPS:-false}
    ports:
      - "80:80"
      - "${HTTPS_PORT:-443}:443"
    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qingyun-net

  # ========== 可选：数据库迁移（一次性执行） ==========
  alembic:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: qingyun-alembic
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - SECRETS_DIR=/run/secrets
    secrets:
      - postgres_password
      - redis_password
      - secret_key
      - jwt_secret_key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qingyun-net
    profiles:
      - migration

volumes:
  pgdata:
  redisdata:
  meilidata:
  nginx_ssl:
  nginx_logs:

networks:
  qingyun-net:
    driver: bridge

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  meilisearch_master_key:
    file: ./secrets/meilisearch_master_key.txt
  secret_key:
    file: ./secrets/secret_key.txt
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  deepseek_api_key:
    file: ./secrets/deepseek_api_key.txt
