# =============================================================================
# 青云智学 - Nginx 反向代理配置（纯 IP 部署）
#
# 环境变量：
#   SERVER_IP  = 服务器公网 IP（必填）
#   USE_HTTPS  = true/false（可选，启用自签名 HTTPS）
#
# HTTP  模式：仅监听 80 端口，前端通过 http://<IP> 访问
# HTTPS 模式：同时监听 80（重定向到 443）和 443（自签名证书）
# =============================================================================

# 上游服务器 — FastAPI 应用
upstream qingyun_app {
    server app:8000;
    keepalive 32;
}

# ============================
# HTTP 主服务（始终启用）
# ============================
server {
    listen 80;
    server_name _;

    # 客户端上传大小限制
    client_max_body_size 50m;
    client_body_timeout 120s;

    # 日志
    access_log /var/log/nginx/qingyun_access.log;
    error_log  /var/log/nginx/qingyun_error.log warn;

    # API 请求
    location /api/ {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # WebSocket — Agent 对话（长时间连接）
    location /api/v1/ws/agent/ {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # WebSocket — 进度推送 & 通知 & QA 流式
    location /api/v1/ws/ {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # WebSocket — 笔记整理进度（app 级别路由）
    location /ws/ {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # 健康检查
    location /health {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # 根路径
    location / {
        proxy_pass http://qingyun_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ============================
# HTTPS（仅在 USE_HTTPS=true 且证书存在时启用）
# ============================
# 以下配置由 entrypoint.sh 在 USE_HTTPS=true 时动态追加
